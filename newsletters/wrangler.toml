name = "newsletters"
main = "src/index.ts"
compatibility_date = "2023-12-18"
tsconfig = "tsconfig.wrangler.json"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true

[observability.logs]
invocation_logs = true

[[d1_databases]]
binding = "NewslettersD1"
database_name = "newsletters"
database_id = "8af56f36-ae7e-4ba6-a8e0-5aa0fe6c16fc"

[[kv_namespaces]]
binding = "JwksCacheKV"
id = "f2bab430727d4f7eb2fae005f2e497f9"

[[ratelimits]]
name = "SESSION_RATE_LIMIT"
namespace_id = "1001"
simple = { limit = 10, period = 60 }

[[ratelimits]]
name = "SUBMIT_RATE_LIMIT"
namespace_id = "1002"
simple = { limit = 5, period = 60 }

[[ratelimits]]
name = "API_RATE_LIMIT"
namespace_id = "1003"
simple = { limit = 60, period = 60 }

[[ratelimits]]
name = "VERIFY_RATE_LIMIT"
namespace_id = "1004"
simple = { limit = 30, period = 60 }
