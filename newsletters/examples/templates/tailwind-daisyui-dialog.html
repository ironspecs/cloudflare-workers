<template id="newsletter-template-daisyui">
	<form class="card relative w-[90vw] max-w-md bg-base-100 text-base-content shadow-2xl" method="dialog">
		<div class="card-title items-start gap-4 bg-base-100 px-3 py-2 md:px-4 md:py-3">
			<div class="space-y-2">
				<p class="font-medium uppercase tracking-[0.2em] text-base-content/60">Newsletter</p>
				<div class="space-y-1">
					<h2 class="text-2xl font-semibold leading-tight">Join the weekly digest</h2>
					<p class="font-normal leading-6 text-base-content/70">
						Get product notes, launch updates, and practical software writing without leaving this page.
					</p>
				</div>
			</div>
		</div>
		<button
			class="btn btn-ghost btn-circle btn-sm absolute right-3 top-2 md:right-4 md:top-3"
			data-newsletters-close
			type="button"
			aria-label="Close newsletter dialog"
		>
			✕
		</button>

		<div class="card-body flex flex-col gap-4 bg-base-100 px-3 py-2 md:gap-6 md:px-4 md:py-3">
			<label class="form-control w-full">
				<div class="label px-0 pb-2 pt-0">
					<span class="label-text text-lg font-medium text-base-content">Email</span>
				</div>
				<input
					class="input w-full border-0 bg-base-200 text-base-content shadow-none outline-none"
					data-newsletters-email
					type="email"
					placeholder="you@example.com"
					required
				/>
			</label>

			<label class="form-control w-full">
				<div class="label px-0 pb-2 pt-0">
					<span class="label-text text-lg font-medium text-base-content">Name</span>
				</div>
				<input
					class="input w-full border-0 bg-base-200 text-base-content shadow-none outline-none"
					data-newsletters-person-name
					type="text"
					placeholder="Ada Lovelace"
				/>
			</label>

			<div class="rounded-box bg-base-200 p-4 text-center" style="min-height: 120px">
				<div class="mb-3 font-medium text-base-content/70">Bot check</div>
				<div data-newsletters-turnstile></div>
			</div>

			<p class="min-h-[1.5rem] font-medium text-error" data-newsletters-error></p>
		</div>

		<div class="card-actions flex justify-end gap-3 bg-base-200 px-3 py-2 md:px-4 md:py-3">
			<button class="btn btn-ghost" data-newsletters-close type="button">Not now</button>
			<button class="btn btn-primary" data-newsletters-submit type="submit">Subscribe</button>
		</div>
	</form>
</template>
