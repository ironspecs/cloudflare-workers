<template id="newsletter-template-daisyui">
	<form class="w-full max-w-lg rounded-box border border-base-300 bg-base-100 text-base-content shadow-xl" method="dialog">
		<div class="flex items-start justify-between gap-4 border-b border-base-300 px-6 py-5">
			<div class="space-y-2">
				<p class="text-sm font-medium uppercase tracking-[0.2em] text-base-content/60">Newsletter</p>
				<div class="space-y-1">
					<h2 class="text-2xl font-semibold leading-tight">Join the weekly digest</h2>
					<p class="text-sm leading-6 text-base-content/70">
						Get product notes, launch updates, and practical software writing without leaving this page.
					</p>
				</div>
			</div>
			<button class="btn btn-ghost btn-circle btn-sm shrink-0" data-newsletters-close type="button" aria-label="Close newsletter dialog">
				✕
			</button>
		</div>

		<div class="space-y-4 px-6 py-5">
			<label class="form-control w-full">
				<div class="label px-0 pb-2 pt-0">
					<span class="label-text font-medium">Email</span>
				</div>
				<input class="input input-bordered w-full" data-newsletters-email type="email" placeholder="you@example.com" required />
			</label>

			<label class="form-control w-full">
				<div class="label px-0 pb-2 pt-0">
					<span class="label-text font-medium">Name</span>
				</div>
				<input class="input input-bordered w-full" data-newsletters-person-name type="text" placeholder="Ada Lovelace" />
			</label>

			<div class="rounded-box border border-base-300 bg-base-200/60 p-4">
				<div class="mb-3 text-sm font-medium text-base-content/70">Bot check</div>
				<div data-newsletters-turnstile></div>
			</div>

			<p class="min-h-[1.5rem] text-sm font-medium text-error" data-newsletters-error></p>
		</div>

		<div class="flex flex-col gap-3 border-t border-base-300 px-6 py-5 sm:flex-row sm:justify-end">
			<button class="btn btn-ghost" data-newsletters-close type="button">Not now</button>
			<button class="btn btn-primary" data-newsletters-submit type="submit">Subscribe</button>
		</div>
	</form>
</template>
