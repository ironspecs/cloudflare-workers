<template id="newsletter-template-daisyui">
	<style>
		.newsletter-dialog {
			--newsletter-spacing-unit: var(--spacing, 0.25rem);
			--newsletter-surface: var(--color-base-100);
			--newsletter-content: var(--color-base-content);
			--newsletter-error: var(--color-error);
			--newsletter-radius-box: var(--radius-box, 0.5rem);
			--newsletter-radius-field: var(--radius-field, 0.25rem);
			position: relative;
			width: min(90vw, 28rem);
			max-width: 28rem;
			background: var(--newsletter-surface);
			color: var(--newsletter-content);
			border-radius: var(--newsletter-radius-box);
		}

		.newsletter-dialog__header {
			align-items: flex-start;
			gap: calc(var(--newsletter-spacing-unit) * 4);
			background: var(--newsletter-surface);
			padding: calc(var(--newsletter-spacing-unit) * 2) calc(var(--newsletter-spacing-unit) * 3);
		}

		.newsletter-dialog__header-copy {
			display: flex;
			flex-direction: column;
			gap: calc(var(--newsletter-spacing-unit) * 2);
		}

		.newsletter-dialog__heading-group {
			display: flex;
			flex-direction: column;
			gap: var(--newsletter-spacing-unit);
		}

		.newsletter-dialog__eyebrow {
			margin: 0;
			font-size: 1rem;
			font-weight: 500;
			letter-spacing: 0.2em;
			line-height: 1.5rem;
			text-transform: uppercase;
			color: color-mix(in oklab, var(--newsletter-content) 60%, transparent);
		}

		.newsletter-dialog__title {
			margin: 0;
			font-size: 1.5rem;
			font-weight: 600;
			line-height: 1.25;
		}

		.newsletter-dialog__description {
			margin: 0;
			font-size: 1rem;
			font-weight: 400;
			line-height: 1.5rem;
			color: color-mix(in oklab, var(--newsletter-content) 70%, transparent);
		}

		.newsletter-dialog__close {
			position: absolute;
			top: calc(var(--newsletter-spacing-unit) * 2);
			right: calc(var(--newsletter-spacing-unit) * 3);
		}

		.newsletter-dialog__content {
			display: flex;
			flex-direction: column;
		}

		.newsletter-dialog__body {
			display: flex;
			flex-direction: column;
			gap: calc(var(--newsletter-spacing-unit) * 4);
			background: var(--newsletter-surface);
			padding: calc(var(--newsletter-spacing-unit) * 2) calc(var(--newsletter-spacing-unit) * 3);
		}

		.newsletter-dialog__field {
			width: 100%;
		}

		.newsletter-dialog__label {
			padding: 0;
		}

		.newsletter-dialog__label-text {
			font-size: 1.125rem;
			font-weight: 500;
			color: var(--newsletter-content);
		}

		.newsletter-dialog__input {
			width: 100%;
			border: 0;
			background: var(--color-base-200);
			color: var(--newsletter-content);
			border-radius: var(--newsletter-radius-field);
			box-shadow: none;
			outline: none;
		}

		.newsletter-dialog__turnstile {
			min-height: 130px;
			padding: calc(var(--newsletter-spacing-unit) * 4);
			text-align: center;
			background: var(--color-base-200);
			border-radius: var(--newsletter-radius-box);
		}

		.newsletter-dialog__turnstile-title {
			margin: 0;
			font-weight: 500;
			color: color-mix(in oklab, var(--newsletter-content) 70%, transparent);
		}

		.newsletter-dialog__error {
			min-height: 1.5rem;
			margin: 0;
			font-weight: 500;
			color: var(--newsletter-error);
		}

		.newsletter-dialog__actions {
			display: flex;
			justify-content: flex-end;
			gap: calc(var(--newsletter-spacing-unit) * 3);
			background: var(--color-base-200);
			padding: calc(var(--newsletter-spacing-unit) * 2) calc(var(--newsletter-spacing-unit) * 3);
		}

		@media (min-width: 48rem) {
			.newsletter-dialog__header,
			.newsletter-dialog__body,
			.newsletter-dialog__actions {
				padding: calc(var(--newsletter-spacing-unit) * 3) calc(var(--newsletter-spacing-unit) * 4);
			}

			.newsletter-dialog__body {
				gap: calc(var(--newsletter-spacing-unit) * 6);
			}

			.newsletter-dialog__close {
				top: calc(var(--newsletter-spacing-unit) * 3);
				right: calc(var(--newsletter-spacing-unit) * 4);
			}
		}

		.newsletter-dialog__success {
			position: absolute;
			inset: 0;
			display: flex;
			align-items: center;
			justify-content: center;
			flex-direction: column;
			gap: calc(var(--newsletter-spacing-unit) * 2);
			padding: calc(var(--newsletter-spacing-unit) * 4);
			opacity: 0;
			pointer-events: none;
		}

		.newsletter-dialog__success-emoji {
			margin: 0;
			line-height: 1;
		}

		.newsletter-dialog__success-message {
			margin: 0;
			color: inherit;
		}
	</style>
	<form class="card shadow-2xl newsletter-dialog" method="dialog">
		<button
			class="btn btn-ghost btn-circle btn-sm newsletter-dialog__close"
			data-newsletters-close
			type="button"
			aria-label="Close newsletter dialog"
		>
			✕
		</button>
		<div class="newsletter-dialog__content" data-newsletters-success-content>
			<div class="card-title newsletter-dialog__header">
				<div class="newsletter-dialog__header-copy">
					<p class="newsletter-dialog__eyebrow">Newsletter</p>
					<div class="newsletter-dialog__heading-group">
						<h2 class="newsletter-dialog__title">Join the weekly digest</h2>
						<p class="newsletter-dialog__description">
							Get product notes, launch updates, and practical software writing without leaving this page.
						</p>
					</div>
				</div>
			</div>

			<div class="card-body newsletter-dialog__body">
				<label class="form-control newsletter-dialog__field">
					<div class="label newsletter-dialog__label">
						<span class="label-text newsletter-dialog__label-text">Email</span>
					</div>
					<input class="input newsletter-dialog__input" data-newsletters-email type="email" placeholder="you@example.com" required />
				</label>

				<label class="form-control newsletter-dialog__field">
					<div class="label newsletter-dialog__label">
						<span class="label-text newsletter-dialog__label-text">Name</span>
					</div>
					<input class="input newsletter-dialog__input" data-newsletters-person-name type="text" placeholder="Ada Lovelace" />
				</label>

				<div class="rounded-box newsletter-dialog__turnstile">
					<div class="newsletter-dialog__turnstile-title">Bot check</div>
					<div data-newsletters-turnstile></div>
				</div>

				<p class="newsletter-dialog__error" data-newsletters-error></p>
			</div>

			<div class="card-actions newsletter-dialog__actions">
				<button class="btn btn-ghost" data-newsletters-close type="button">Not now</button>
				<button class="btn btn-primary" data-newsletters-submit type="submit">Subscribe</button>
			</div>
		</div>
		<div class="newsletter-dialog__success" data-newsletters-success aria-hidden="true">
			<p class="newsletter-dialog__success-emoji" aria-hidden="true">✅</p>
			<p class="newsletter-dialog__title newsletter-dialog__success-message">Subscribed!</p>
		</div>
	</form>
</template>
